<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📝 Task Manager</h1>
        <p class="subtitle">Organize your day, one task at a time</p>

        <div class="input-container">
            <input type="text" id="taskInput" placeholder="What needs to be done?" />
            <button class="btn btn-add" id="addBtn">Add Task</button>
        </div>

        <div class="stats">
            <div class="stat-card total">
                <div class="stat-number" id="totalTasks">0</div>
                <div class="stat-label">Total Tasks</div>
            </div>
            <div class="stat-card completed">
                <div class="stat-number" id="completedTasks">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card pending">
                <div class="stat-number" id="pendingTasks">0</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>

        <div class="tasks-list" id="tasksList"></div>
    </div>

    <script>
        let tasks = [];
        let editingTaskId = null;

        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const tasksList = document.getElementById('tasksList');

        // Load tasks from localStorage on page load
        function loadTasks() {
            const savedTasks = localStorage.getItem('tasks');
            if (savedTasks) {
                tasks = JSON.parse(savedTasks);
                renderTasks();
            }
        }

        // Save tasks to localStorage
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        // Add new task
        function addTask() {
            const taskText = taskInput.value.trim();
            
            if (taskText === '') {
                alert('Please enter a task!');
                return;
            }

            if (editingTaskId !== null) {
                // Update existing task
                const taskIndex = tasks.findIndex(t => t.id === editingTaskId);
                tasks[taskIndex].text = taskText;
                editingTaskId = null;
                addBtn.textContent = 'Add Task';
                addBtn.classList.remove('btn-edit');
                addBtn.classList.add('btn-add');
            } else {
                // Add new task
                const task = {
                    id: Date.now(),
                    text: taskText,
                    completed: false
                };
                tasks.push(task);
            }

            taskInput.value = '';
            saveTasks();
            renderTasks();
        }

        // Delete task
        function deleteTask(id) {
            if (confirm('Are you sure you want to delete this task?')) {
                tasks = tasks.filter(task => task.id !== id);
                saveTasks();
                renderTasks();
            }
        }

        // Edit task
        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            taskInput.value = task.text;
            editingTaskId = id;
            addBtn.textContent = 'Update Task';
            addBtn.classList.remove('btn-add');
            addBtn.classList.add('btn-edit');
            taskInput.focus();
        }

        // Toggle task completion
        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            task.completed = !task.completed;
            saveTasks();
            renderTasks();
        }

        // Update statistics
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('pendingTasks').textContent = pending;
        }

        // Render all tasks
        function renderTasks() {
            if (tasks.length === 0) {
                tasksList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎯</div>
                        <p>No tasks yet. Add one to get started!</p>
                    </div>
                `;
            } else {
                tasksList.innerHTML = tasks.map(task => `
                    <div class="task-item ${task.completed ? 'completed' : ''}">
                        <input 
                            type="checkbox" 
                            class="task-checkbox" 
                            ${task.completed ? 'checked' : ''}
                            onchange="toggleTask(${task.id})"
                        />
                        <span class="task-text">${task.text}</span>
                        <div class="task-actions">
                            <button class="btn btn-edit" onclick="editTask(${task.id})">Edit</button>
                            <button class="btn btn-delete" onclick="deleteTask(${task.id})">Delete</button>
                        </div>
                    </div>
                `).join('');
            }
            updateStats();
        }

        // Event listeners
        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        // Initialize app
        loadTasks();
    </script>
</body>
</html>
